<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pulse — Concert Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    .map-page {
      max-width: 1200px;
      margin: 10vh auto 0;
      padding: 0 24px 60px;
    }

    .map-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
      margin-top: 20px;
      align-items: start;
    }

    @media (max-width: 860px) {
      .map-layout { grid-template-columns: 1fr; }
    }

    #map {
      width: 100%;
      height: 540px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      background: #0b1d3a;
    }

    .map-controls {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .radius-select {
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.07);
      color: inherit;
      font-family: 'Poppins', sans-serif;
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
    }

    .map-status {
      font-size: 0.82rem;
      opacity: 0.65;
      margin-left: auto;
    }

    /* Sidebar event list */
    .event-list-sidebar {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 590px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .event-list-sidebar::-webkit-scrollbar { width: 4px; }
    .event-list-sidebar::-webkit-scrollbar-track { background: transparent; }
    .event-list-sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    .map-event-item {
      background: rgba(11,29,58,0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.18s, transform 0.18s;
    }

    .map-event-item:hover, .map-event-item.active {
      border-color: rgba(255,150,29,0.5);
      transform: translateX(-3px);
    }

    .map-event-name {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--fg);
      margin: 0 0 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .map-event-meta {
      font-size: 0.75rem;
      opacity: 0.65;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .map-event-date {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      background: var(--bg);
      color: var(--accent-contrast);
      border-radius: 6px;
      padding: 2px 7px;
      margin-top: 5px;
    }

    .sidebar-empty {
      font-size: 0.87rem;
      opacity: 0.6;
      padding: 8px 0;
      text-align: center;
    }

    /* Leaflet popup overrides */
    .leaflet-popup-content-wrapper {
      background: rgba(11,29,58,0.97) !important;
      border: 1px solid rgba(255,150,29,0.4) !important;
      border-radius: 14px !important;
      color: #fff6d7 !important;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5) !important;
      font-family: 'Poppins', sans-serif !important;
    }

    .leaflet-popup-tip { background: rgba(11,29,58,0.97) !important; }
    .leaflet-popup-close-button { color: #fff6d7 !important; }

    .popup-name { font-weight: 700; font-size: 0.92rem; margin: 0 0 4px; }
    .popup-venue { font-size: 0.8rem; opacity: 0.7; margin: 0 0 2px; }
    .popup-date  { font-size: 0.78rem; opacity: 0.6; margin: 0 0 10px; }
    .popup-btn {
      display: inline-block;
      background: #FF961D;
      color: #0b1324;
      font-weight: 700;
      font-size: 0.78rem;
      padding: 5px 12px;
      border-radius: 8px;
      text-decoration: none;
    }
    .popup-btn:hover { opacity: 0.85; }
  </style>
</head>

<body>
  <main class="map-page">
    <header class="brand">
      <div class="logo">Pulse</div>
      <p class="subtitle">Concert Map</p>
    </header>

    <div class="map-controls">
      <button class="btn btn-primary" id="locateBtn">Use My Location</button>
      <select class="radius-select" id="radiusSelect">
        <option value="10">10 miles</option>
        <option value="25" selected>25 miles</option>
        <option value="50">50 miles</option>
        <option value="100">100 miles</option>
      </select>
      <span class="map-status" id="mapStatus">Click "Use My Location" to find concerts near you.</span>
    </div>

    <div class="map-layout">
      <div>
        <div id="map"></div>
      </div>
      <aside>
        <div class="card" style="padding: 14px 16px 16px;">
          <div style="font-size:0.72rem;font-weight:700;letter-spacing:0.9px;text-transform:uppercase;opacity:0.55;margin-bottom:6px;">Nearby Concerts</div>
          <div class="event-list-sidebar" id="eventList">
            <p class="sidebar-empty">No events loaded yet.</p>
          </div>
        </div>
      </aside>
    </div>

    <p style="margin-top:20px;">
      <a class="btn btn-ghost" href="{{ url_for('home') }}">Back to Home</a>
    </p>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
  (function () {
    // ── Map init ──────────────────────────────────────────────
    var map = L.map("map", { zoomControl: true }).setView([34.05, -118.24], 10);

    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
      maxZoom: 18,
    }).addTo(map);

    // Custom orange marker icon
    var markerIcon = L.divIcon({
      className: "",
      html: '<div style="width:14px;height:14px;background:#FF961D;border:2px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.5);"></div>',
      iconSize: [14, 14],
      iconAnchor: [7, 7],
      popupAnchor: [0, -10],
    });

    var userIcon = L.divIcon({
      className: "",
      html: '<div style="width:16px;height:16px;background:#6dffb8;border:2px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.6);"></div>',
      iconSize: [16, 16],
      iconAnchor: [8, 8],
    });

    var markers = [];
    var userMarker = null;
    var activeIndex = -1;
    var statusEl  = document.getElementById("mapStatus");
    var eventList = document.getElementById("eventList");
    var locateBtn = document.getElementById("locateBtn");
    var radiusSelect = document.getElementById("radiusSelect");

    function setStatus(msg) { statusEl.textContent = msg; }

    // ── Render event list ────────────────────────────────────
    function renderList(events) {
      eventList.innerHTML = "";
      if (!events.length) {
        eventList.innerHTML = '<p class="sidebar-empty">No concerts found nearby.</p>';
        return;
      }
      events.forEach(function (ev, i) {
        var item = document.createElement("div");
        item.className = "map-event-item";
        item.dataset.index = i;
        var timeStr = ev.time ? ev.time.slice(0, 5) : "";
        item.innerHTML =
          '<div class="map-event-name">' + esc(ev.name) + '</div>' +
          '<div class="map-event-meta">' + esc(ev.venue) + (ev.city ? " · " + esc(ev.city) : "") + '</div>' +
          '<div class="map-event-date">' + esc(ev.date) + (timeStr ? " @ " + timeStr : "") + '</div>';
        item.addEventListener("click", function () {
          flyToEvent(i);
        });
        eventList.appendChild(item);
      });
    }

    function setActiveItem(index) {
      document.querySelectorAll(".map-event-item").forEach(function (el) {
        el.classList.toggle("active", parseInt(el.dataset.index) === index);
      });
      activeIndex = index;
      // scroll into view
      var active = eventList.querySelector(".map-event-item.active");
      if (active) active.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    // ── Place markers ────────────────────────────────────────
    function placeMarkers(events) {
      markers.forEach(function (m) { map.removeLayer(m); });
      markers = [];
      events.forEach(function (ev, i) {
        var m = L.marker([ev.lat, ev.lng], { icon: markerIcon }).addTo(map);
        var timeStr = ev.time ? ev.time.slice(0, 5) : "";
        m.bindPopup(
          '<p class="popup-name">' + esc(ev.name) + '</p>' +
          '<p class="popup-venue">' + esc(ev.venue) + (ev.city ? ", " + esc(ev.city) : "") + '</p>' +
          '<p class="popup-date">' + esc(ev.date) + (timeStr ? " · " + timeStr : "") + '</p>' +
          '<a class="popup-btn" href="' + esc(ev.url) + '" target="_blank" rel="noopener">Get Tickets</a>'
        );
        m.on("click", function () { setActiveItem(i); });
        markers.push(m);
      });
    }

    function flyToEvent(index) {
      setActiveItem(index);
      if (markers[index]) {
        map.flyTo(markers[index].getLatLng(), 14, { duration: 0.8 });
        markers[index].openPopup();
      }
    }

    // ── Fetch concerts ───────────────────────────────────────
    function loadConcerts(lat, lng) {
      var radius = radiusSelect.value;
      setStatus("Loading concerts…");
      fetch("/api/nearby-concerts?lat=" + lat + "&lng=" + lng + "&radius=" + radius)
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var events = data.events || [];
          var src = data.source === "static" ? " (showing sample events — add TICKETMASTER_KEY for live data)" : "";
          setStatus(events.length + " concert" + (events.length === 1 ? "" : "s") + " found within " + radius + " miles." + src);
          placeMarkers(events);
          renderList(events);
          if (events.length) {
            var group = L.featureGroup(markers);
            map.fitBounds(group.getBounds().pad(0.2));
          }
        })
        .catch(function () {
          setStatus("Could not load concerts.");
        });
    }

    // ── Locate user ──────────────────────────────────────────
    locateBtn.addEventListener("click", function () {
      if (!navigator.geolocation) {
        setStatus("Geolocation is not supported by your browser.");
        return;
      }
      setStatus("Detecting your location…");
      locateBtn.disabled = true;
      navigator.geolocation.getCurrentPosition(
        function (pos) {
          locateBtn.disabled = false;
          var lat = pos.coords.latitude;
          var lng = pos.coords.longitude;
          if (userMarker) map.removeLayer(userMarker);
          userMarker = L.marker([lat, lng], { icon: userIcon })
            .addTo(map)
            .bindPopup("You are here")
            .openPopup();
          map.setView([lat, lng], 12);
          loadConcerts(lat, lng);
        },
        function () {
          locateBtn.disabled = false;
          setStatus("Location access denied. Using Los Angeles as default.");
          loadConcerts(34.0522, -118.2437);
        }
      );
    });

    radiusSelect.addEventListener("change", function () {
      if (userMarker) {
        var ll = userMarker.getLatLng();
        loadConcerts(ll.lat, ll.lng);
      }
    });

    function esc(s) {
      return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
  })();
  </script>
</body>
</html>
