<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pulse - Matchmaking</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <style>
    .matchmaking-page {
      max-width: 1200px;
      margin: 12vh auto 0;
      padding: 0 24px 40px;
    }

    .matchmaking-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 20px;
      align-items: start;
    }

    /* Sticky right panel */
    .matchmaking-sidebar {
      position: sticky;
      top: 24px;
      max-height: calc(100vh - 48px);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,150,29,0.3) transparent;
    }
    .matchmaking-sidebar::-webkit-scrollbar { width: 4px; }
    .matchmaking-sidebar::-webkit-scrollbar-thumb {
      background: rgba(255,150,29,0.3);
      border-radius: 99px;
    }

    .search-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
    }
    .search-input {
      flex: 1;
      padding: 11px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: inherit;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      outline: none;
    }
    .search-input::placeholder { opacity: 0.6; }

    .empty-state {
      opacity: 0.75;
      padding: 10px 4px;
      font-size: 0.9rem;
    }
    .req-btn  { min-width: 80px; }
    .add-btn[disabled] { opacity: 0.6; cursor: not-allowed; }

    @media (max-width: 860px) {
      .matchmaking-layout { grid-template-columns: 1fr; }
      .matchmaking-sidebar { position: static; max-height: none; }
    }
  </style>
</head>

<body>
  <main class="matchmaking-page">
    <header class="brand">
      <div class="logo">Pulse</div>
      <p class="subtitle">Matchmaking</p>
    </header>

    <div class="matchmaking-layout">

      <!-- LEFT: suggested accounts -->
      <section class="card">
        <h2>Suggested Accounts</h2>
        <section id="suggested-list" class="matchmaker-feed" aria-label="Suggested Accounts">
          <p id="suggested-loading" style="opacity:0.6;padding:8px 4px;">Loading users…</p>
          <p id="suggested-empty" class="empty-state" hidden>No other users found.</p>
        </section>
        <p style="margin-top:16px;">
          <a class="btn btn-ghost" href="{{ url_for('home') }}">Back to Home</a>
        </p>
      </section>

      <!-- RIGHT: sticky sidebar — requests + search -->
      <aside class="matchmaking-sidebar">

        <!-- Friend Requests -->
        <div class="card">
          <h2 style="font-size:1.05rem;margin-bottom:12px;">Friend Requests</h2>
          <section id="requests-list" class="matchmaker-feed" aria-label="Friend Requests">
            <p id="requests-empty" class="empty-state">No new friend requests.</p>
          </section>
        </div>

        <!-- Search -->
        <div class="card">
          <h2 style="font-size:1.05rem;margin-bottom:4px;">Find a Friend</h2>
          <div class="search-row">
            <input id="friendSearch" class="search-input" type="text"
                   placeholder="Search by username…" autocomplete="off" aria-label="Search friends" />
            <button id="clearSearch" type="button" class="btn btn-ghost">Clear</button>
          </div>
          <section id="search-results" class="matchmaker-feed" style="margin-top:12px;" aria-label="Search Results"></section>
          <p id="search-empty" class="empty-state" hidden>No results found.</p>
        </div>

      </aside>
    </div><!-- /.matchmaking-layout -->
  </main>

  <script>
    (function () {
      const requestsList = document.getElementById("requests-list");
      const requestsEmpty = document.getElementById("requests-empty");
      const searchInput = document.getElementById("friendSearch");
      const clearBtn = document.getElementById("clearSearch");
      const results = document.getElementById("search-results");
      const searchEmpty = document.getElementById("search-empty");

      function esc(s) {
        return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
      }
      function makeInitials(name) {
        const parts = (name || "").trim().split(/\s+/).filter(Boolean);
        return ((parts[0]||"U")[0] + ((parts[1]||"")[0]||"")).toUpperCase();
      }

      function updateRequestsEmpty() {
        const visible = requestsList.querySelectorAll(".request-card:not([hidden])");
        requestsEmpty.hidden = visible.length !== 0;
      }

      // Load pending friend requests
      (async function loadRequests() {
        try {
          const res  = await fetch("/friend/requests");
          const data = await res.json();
          (data.requests || []).forEach(u => {
            const username   = esc(u.username || "");
            const userId     = esc(String(u.id));
            const initials   = makeInitials(u.username);
            const profileUrl = "/u/" + encodeURIComponent(u.username || userId);
            requestsList.insertAdjacentHTML("beforeend", `
              <article class="user-card request-card" data-user="${userId}" data-user-id="${userId}" data-name="${username}">
                <div class="user-header"><div class="user-title">Sent you a friend request</div></div>
                <div class="user-main">
                  <div class="user-avatar">${initials}</div>
                  <div class="user-meta">
                    <div class="user-name">${username}</div>
                    <div class="user-handle">@${username}</div>
                  </div>
                  <div class="user-actions">
                    <button type="button" class="btn btn-ghost req-btn" data-action="accept">Accept</button>
                    <button type="button" class="btn btn-ghost req-btn" data-action="reject">Reject</button>
                    <a class="btn btn-primary" href="${profileUrl}">View</a>
                  </div>
                </div>
              </article>`);
          });
          updateRequestsEmpty();
        } catch (e) { updateRequestsEmpty(); }
      })();

      // Search
      function renderSearch(users) {
        results.innerHTML = "";
        if (!users || !users.length) { searchEmpty.hidden = false; return; }
        searchEmpty.hidden = true;
        users.forEach(u => {
          const name    = esc(u.name || u.username || "User");
          const handle  = esc(u.handle || ("@" + (u.username || "")));
          const id      = esc(String(u.id || u.username || name));
          const initials = esc(makeInitials(u.name || u.username));
          const profileUrl = "/u/" + encodeURIComponent(u.username || name);
          results.insertAdjacentHTML("beforeend", `
            <article class="user-card search-card" data-user="${id}" data-user-id="${id}" data-name="${name}" data-handle="${handle}">
              <div class="user-header"><div class="user-title">Search result</div></div>
              <div class="user-main">
                <div class="user-avatar">${initials}</div>
                <div class="user-meta">
                  <div class="user-name">${name}</div>
                  <div class="user-handle">${handle}</div>
                </div>
                <div class="user-actions">
                  <button type="button" class="btn btn-ghost add-btn" data-action="add-friend">Add Friend</button>
                  <a class="btn btn-primary" href="${profileUrl}">View</a>
                </div>
              </div>
            </article>`);
        });
      }

      let timer = null;
      async function doSearch() {
        const q = (searchInput.value || "").trim();
        if (!q) { results.innerHTML = ""; searchEmpty.hidden = true; return; }
        try {
          const r = await fetch(`/search_users?q=${encodeURIComponent(q)}`, { headers: { Accept: "application/json" } });
          renderSearch(r.ok ? (await r.json()).users || [] : []);
        } catch { renderSearch([]); }
      }
      searchInput.addEventListener("input", () => { clearTimeout(timer); timer = setTimeout(doSearch, 200); });
      clearBtn.addEventListener("click", () => { searchInput.value = ""; results.innerHTML = ""; searchEmpty.hidden = true; searchInput.focus(); });

      // Button actions (accept / reject / add-friend)
      document.addEventListener("click", function (e) {
        const btn = e.target.closest("[data-action]");
        if (!btn) return;
        const action = btn.dataset.action;

        if (action === "accept" || action === "reject") {
          const card = btn.closest(".request-card");
          if (!card) return;
          card.hidden = true;
          updateRequestsEmpty();
          fetch(action === "accept" ? "/friend/accept" : "/friend/reject", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sender_id: card.dataset.userId })
          }).catch(() => {});
          return;
        }

        if (action === "add-friend") {
          const card = btn.closest(".user-card");
          if (!card) return;
          const friendId = card.dataset.userId;
          if (!friendId) return;
          btn.disabled = true;
          btn.textContent = "Sending…";
          fetch("/friend/add", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ friend_id: friendId })
          })
            .then(r => r.json())
            .then(data => {
              if (data.error) { btn.disabled = false; btn.textContent = "Add Friend"; alert("Error: " + data.error); }
              else { btn.textContent = "Requested"; btn.setAttribute("aria-disabled","true"); }
            })
            .catch(() => { btn.disabled = false; btn.textContent = "Add Friend"; });
        }
      });

      updateRequestsEmpty();
    })();
  </script>

  <!-- Load suggested accounts -->
  <script>
    (async function () {
      const list    = document.getElementById("suggested-list");
      const loading = document.getElementById("suggested-loading");
      const empty   = document.getElementById("suggested-empty");

      function esc(s) { return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
      function initials(u) { return (u||"?")[0].toUpperCase(); }

      try {
        const res   = await fetch("/users/all");
        const data  = await res.json();
        const users = data.users || [];
        loading.remove();

        if (!users.length) { empty.hidden = false; return; }

        users.forEach(u => {
          const username   = esc(u.username || "");
          const handle     = esc(u.handle || ("@" + u.username));
          const userId     = esc(String(u.id));
          const profileUrl = "/u/" + encodeURIComponent(u.username || userId);
          const status     = u.status || "none";

          const btnLabel    = status === "accepted" ? "Friends" : status === "pending" ? "Requested" : "Add Friend";
          const btnDisabled = status !== "none";

          list.insertAdjacentHTML("beforeend", `
            <article class="user-card suggested-card" data-user="${userId}" data-user-id="${userId}" data-name="${username}" data-handle="${handle}">
              <div class="user-header"><div class="user-title">Suggested for you</div></div>
              <div class="user-main">
                <div class="user-avatar">${initials(u.username)}</div>
                <div class="user-meta">
                  <div class="user-name">${username}</div>
                  <div class="user-handle">${handle}</div>
                </div>
                <div class="user-actions">
                  <button type="button" class="btn btn-ghost add-btn" data-action="add-friend"
                    ${btnDisabled ? "disabled aria-disabled='true'" : ""}>${btnLabel}</button>
                  <a class="btn btn-primary" href="${profileUrl}">View</a>
                </div>
              </div>
            </article>`);
        });
      } catch (e) {
        loading.textContent = "Could not load users.";
      }
    })();
  </script>
</body>
</html>
