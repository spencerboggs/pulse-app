<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pulse - Matchmaking</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>
  <main class="container">
    <header class="brand">
      <div class="logo">Pulse</div>
      <p class="subtitle">Matchmaking</p>
    </header>

    <section class="card">
      <h2>Friend Requests</h2>

      <section id="requests-list" class="matchmaker-feed" aria-label="Friend Requests">
        <p id="requests-empty" class="empty-state">No new friend requests.</p>

      </section>
    </section>

    <section class="card" style="margin-top:16px;">
      <h2>Find a Friend</h2>

      <div class="search-row">
        <input
          id="friendSearch"
          class="search-input"
          type="text"
          placeholder="Search by name, username, or @handle"
          autocomplete="off"
          aria-label="Search friends"
        />
        <button id="clearSearch" type="button" class="btn btn-ghost">Clear</button>
      </div>

      <p class="helper-text" style="display:none;"></p>

      <section id="search-results" class="matchmaker-feed" style="margin-top:14px;" aria-label="Search Results"></section>
      <p id="search-empty" class="empty-state" hidden>No results found.</p>
    </section>

    <section class="card" style="margin-top:16px;">
      <h2>Suggested Accounts</h2>

      <section id="suggested-list" class="matchmaker-feed" aria-label="Suggested Accounts">
        <p id="suggested-loading" style="opacity:0.6;padding:8px 4px;">Loading users…</p>
        <p id="suggested-empty" class="empty-state" hidden>No other users found.</p>
      </section>

      <p style="margin-top:16px;">
        <a class="btn btn-ghost" href="{{ url_for('home') }}">Back to Home</a>
      </p>
    </section>
  </main>

  <script>
    (function () {
      const requestsList = document.getElementById("requests-list");
      const requestsEmpty = document.getElementById("requests-empty");

      const searchInput = document.getElementById("friendSearch");
      const clearBtn = document.getElementById("clearSearch");
      const results = document.getElementById("search-results");
      const searchEmpty = document.getElementById("search-empty");

      function updateRequestsEmpty() {
        const visible = requestsList.querySelectorAll(".request-card:not([hidden])");
        requestsEmpty.hidden = visible.length !== 0;
      }

      function makeInitials(username) {
        return (username || "?")[0].toUpperCase();
      }

      function esc(s) {
        return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }

      // Fetch real pending requests from the server
      (async function loadRequests() {
        try {
          const res = await fetch("/friend/requests");
          const data = await res.json();
          (data.requests || []).forEach(u => {
            const username = esc(u.username || "");
            const userId = esc(String(u.id));
            const initials = makeInitials(u.username);
            const profileUrl = "/u/" + encodeURIComponent(u.username || userId);

            requestsList.insertAdjacentHTML("beforeend", `
              <article class="user-card request-card" data-user="${userId}" data-user-id="${userId}" data-name="${username}">
                <div class="user-header">
                  <div class="user-title">Sent you a friend request</div>
                </div>
                <div class="user-main">
                  <div class="user-avatar">${initials}</div>
                  <div class="user-meta">
                    <div class="user-name">${username}</div>
                    <div class="user-handle">@${username}</div>
                  </div>
                  <div class="user-actions">
                    <button type="button" class="btn btn-ghost req-btn" data-action="accept">Accept</button>
                    <button type="button" class="btn btn-ghost req-btn" data-action="reject">Reject</button>
                    <a class="btn btn-primary" href="${profileUrl}">View</a>
                  </div>
                </div>
              </article>
            `);
          });
          updateRequestsEmpty();
        } catch (e) { updateRequestsEmpty(); }
      })();

      function setRequested(btn) {
        btn.textContent = "Requested";
        btn.disabled = true;
        btn.setAttribute("aria-disabled", "true");
      }

      function esc(s) {
        return (s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function makeInitials(name) {
        const parts = (name || "").trim().split(/\s+/).filter(Boolean);
        const a = (parts[0] || "U")[0] || "U";
        const b = (parts[1] || "")[0] || "";
        return (a + b).toUpperCase();
      }

      function renderSearch(users) {
        results.innerHTML = "";

        if (!users || users.length === 0) {
          searchEmpty.hidden = false;
          return;
        }

        searchEmpty.hidden = true;

        users.forEach(function (u) {
          const name = u.name || u.username || "User";
          const handle = u.handle || (u.username ? ("@" + u.username) : "");
          const id = u.id || u.username || name;
          const initials = u.initials || makeInitials(name);

          const safeName = esc(name);
          const safeHandle = esc(handle);
          const safeId = esc(String(id));
          const safeInitials = esc(initials);

          const usernameForProfile = encodeURIComponent(u.username || name);

          results.insertAdjacentHTML("beforeend", `
            <article class="user-card search-card" data-user="${safeId}" data-user-id="${safeId}" data-name="${safeName}" data-handle="${safeHandle}">
              <div class="user-header">
                <div class="user-title">Search result</div>
              </div>
              <div class="user-main">
                <div class="user-avatar">${safeInitials}</div>
                <div class="user-meta">
                  <div class="user-name">${safeName}</div>
                  <div class="user-handle">${safeHandle}</div>
                </div>
                <div class="user-actions">
                  <button type="button" class="btn btn-ghost add-btn" data-action="add-friend">Add Friend</button>
                  <a class="btn btn-primary" href="/profile/${usernameForProfile}">View</a>
                </div>
              </div>
            </article>
          `);
        });
      }

      let timer = null;

      async function doSearch() {
        const q = (searchInput.value || "").trim();

        if (q.length === 0) {
          results.innerHTML = "";
          searchEmpty.hidden = true;
          return;
        }

        try {
          const r = await fetch(`/search_users?q=${encodeURIComponent(q)}`, {
            headers: { "Accept": "application/json" }
          });

          if (!r.ok) {
            renderSearch([]);
            return;
          }

          const data = await r.json();
          renderSearch(data.users || []);
        } catch (err) {
          renderSearch([]);
        }
      }

      searchInput.addEventListener("input", function () {
        clearTimeout(timer);
        timer = setTimeout(doSearch, 200);
      });

      clearBtn.addEventListener("click", function () {
        searchInput.value = "";
        results.innerHTML = "";
        searchEmpty.hidden = true;
        searchInput.focus();
      });

      document.addEventListener("click", function (e) {
        const actionBtn = e.target.closest("[data-action]");
        if (!actionBtn) return;

        const action = actionBtn.dataset.action;

        if (action === "accept" || action === "reject") {
          const reqCard = actionBtn.closest(".request-card");
          if (!reqCard) return;

          const senderId = reqCard.dataset.userId;
          const url = action === "accept" ? "/friend/accept" : "/friend/reject";

          reqCard.hidden = true;
          updateRequestsEmpty();

          fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sender_id: senderId })
          }).catch(() => {});

          return;
        }

        if (action === "add-friend") {
          const card = actionBtn.closest(".user-card");
          if (!card) return;

          const friendId = card.dataset.userId;
          if (!friendId) return;

          actionBtn.disabled = true;
          actionBtn.textContent = "Sending…";

          fetch("/friend/add", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ friend_id: friendId })
          })
            .then(r => r.json())
            .then(data => {
              if (data.error) {
                actionBtn.disabled = false;
                actionBtn.textContent = "Add Friend";
                alert("Error: " + data.error);
              } else {
                actionBtn.textContent = "Requested";
                actionBtn.setAttribute("aria-disabled", "true");
              }
            })
            .catch(() => {
              actionBtn.disabled = false;
              actionBtn.textContent = "Add Friend";
            });

          return;
        }
      });

      updateRequestsEmpty();
    })();
  </script>

  <style>
    .empty-state {
      opacity: 0.75;
      padding: 12px 6px;
    }

    .req-btn {
      min-width: 92px;
    }

    .add-btn[disabled] {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .search-row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 10px;
    }

    .search-input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: inherit;
      outline: none;
    }

    .search-input::placeholder {
      opacity: 0.7;
    }

    .helper-text {
      margin-top: 10px;
      opacity: 0.75;
      font-size: 0.95rem;
    }

    code {
      opacity: 0.9;
    }
  </style>

  <script>
    // Load all users from the database into the Suggested Accounts section
    (async function () {
      const list = document.getElementById("suggested-list");
      const loading = document.getElementById("suggested-loading");
      const empty = document.getElementById("suggested-empty");

      function esc(s) {
        return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }

      function makeInitials(username) {
        return (username || "?")[0].toUpperCase();
      }

      try {
        const res = await fetch("/users/all");
        const data = await res.json();
        const users = data.users || [];

        loading.remove();

        if (!users.length) {
          empty.hidden = false;
          return;
        }

        users.forEach(u => {
          const username = esc(u.username || "");
          const handle = esc(u.handle || ("@" + u.username));
          const userId = esc(String(u.id));
          const initials = makeInitials(u.username);
          const profileUrl = "/u/" + encodeURIComponent(u.username || userId);
          const status = u.status || "none"; // "none" | "pending" | "accepted"

          let btnLabel, btnDisabled;
          if (status === "accepted") {
            btnLabel = "Friends";
            btnDisabled = true;
          } else if (status === "pending") {
            btnLabel = "Requested";
            btnDisabled = true;
          } else {
            btnLabel = "Add Friend";
            btnDisabled = false;
          }

          list.insertAdjacentHTML("beforeend", `
            <article class="user-card suggested-card" data-user="${userId}" data-user-id="${userId}" data-name="${username}" data-handle="${handle}">
              <div class="user-header">
                <div class="user-title">Suggested for you</div>
              </div>
              <div class="user-main">
                <div class="user-avatar">${initials}</div>
                <div class="user-meta">
                  <div class="user-name">${username}</div>
                  <div class="user-handle">${handle}</div>
                </div>
                <div class="user-actions">
                  <button type="button" class="btn btn-ghost add-btn" data-action="add-friend"
                    ${btnDisabled ? "disabled aria-disabled='true'" : ""}>${btnLabel}</button>
                  <a class="btn btn-primary" href="${profileUrl}">View</a>
                </div>
              </div>
            </article>
          `);
        });
      } catch (e) {
        loading.textContent = "Could not load users.";
      }
    })();
  </script>
</body>
</html>
