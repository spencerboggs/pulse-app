<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pulse - Matchmaking</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <style>
    .matchmaking-page {
      max-width: 860px;
      margin: 12vh auto 0;
      padding: 0 24px 40px;
    }
    .search-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
    }
    .search-input {
      flex: 1;
      padding: 11px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: inherit;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      outline: none;
    }
    .search-input::placeholder { opacity: 0.6; }
    .empty-state {
      opacity: 0.65;
      padding: 10px 4px;
      font-size: 0.9rem;
    }
    .req-btn  { min-width: 80px; }
    .add-btn[disabled] { opacity: 0.6; cursor: not-allowed; }

    /* invite box */
    .invite-box {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      padding: 12px 16px;
    }
    .invite-link-text {
      flex: 1;
      font-size: 0.88rem;
      opacity: 0.8;
      word-break: break-all;
    }
    .copy-toast {
      font-size: 0.8rem;
      color: #6dffb8;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }
    .copy-toast.show { opacity: 1; }

    @media (max-width: 600px) {
      .matchmaking-page { padding: 0 12px 32px; }
    }
  </style>
</head>

<body data-user-id="{{ session.get('user_id', '') }}">
  <main class="matchmaking-page">
    <header class="brand">
      <div class="logo">Pulse</div>
      <p class="subtitle">Matchmaking</p>
    </header>

    <!-- INVITE LINK -->
    <section class="card" style="margin-bottom:16px;">
      <h2>Invite a Friend</h2>
      <p style="opacity:0.75;font-size:0.9rem;">Share your invite link and grow your music network.</p>
      <div class="invite-box">
        <span class="invite-link-text" id="inviteLinkText">http://localhost:5000</span>
        <span class="copy-toast" id="copyToast">Copied!</span>
        <button class="btn btn-primary" id="copyInviteBtn">Copy Link</button>
      </div>
    </section>

    <!-- FRIEND REQUESTS -->
    <section class="card" style="margin-bottom:16px;">
      <h2>Friend Requests</h2>
      <section id="requests-list" class="matchmaker-feed" aria-label="Friend Requests">
        <p id="requests-empty" class="empty-state">No new friend requests.</p>
      </section>
    </section>

    <!-- SEARCH -->
    <section class="card" style="margin-bottom:16px;">
      <h2>Find a Friend</h2>
      <div class="search-row">
        <input id="friendSearch" class="search-input" type="text"
          placeholder="Search by name, username, or @handle" autocomplete="off" />
        <button id="clearSearch" type="button" class="btn btn-ghost">Clear</button>
      </div>
      <section id="search-results" class="matchmaker-feed" style="margin-top:14px;"></section>
      <p id="search-empty" class="empty-state" hidden>No results found.</p>
    </section>

    <!-- SUGGESTED -->
    <section class="card">
      <h2>Suggested Accounts</h2>
      <section id="suggested-list" class="matchmaker-feed" aria-label="Suggested Accounts">
        <p id="suggested-loading" class="empty-state">Loading suggestions...</p>
      </section>
      <p style="margin-top:16px;">
        <a class="btn btn-ghost" href="{{ url_for('home') }}">Back to Home</a>
      </p>
    </section>
  </main>

  <script src="{{ url_for('static', filename='js/similarity-cache.js') }}"></script>
  <script src="{{ url_for('static', filename='js/similarity.js') }}"></script>
  <script>
  (function () {
    // ── Helpers ──────────────────────────────────────────────
    function esc(s) {
      return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
    }
    function initials(name) {
      const p = (name||"").trim().split(/\s+/).filter(Boolean);
      return ((p[0]||"U")[0] + ((p[1]||"")[0]||"")).toUpperCase();
    }
    function getEl(id) { return document.getElementById(id); }

    // ── Invite link ──────────────────────────────────────────
    const INVITE_URL = "http://localhost:5000";
    getEl("inviteLinkText").textContent = INVITE_URL;
    getEl("copyInviteBtn").addEventListener("click", function () {
      navigator.clipboard.writeText(INVITE_URL).then(function () {
        const toast = getEl("copyToast");
        toast.classList.add("show");
        setTimeout(function () { toast.classList.remove("show"); }, 2000);
      });
    });

    // ── Friend Requests ──────────────────────────────────────
    const requestsList = getEl("requests-list");
    const requestsEmpty = getEl("requests-empty");

    function updateRequestsEmpty() {
      const visible = requestsList.querySelectorAll(".request-card");
      requestsEmpty.hidden = visible.length > 0;
    }

    function renderRequest(u) {
      const name = esc(u.name || u.username || "User");
      const handle = esc(u.handle || "@" + u.username);
      const id = esc(String(u.id));
      const inits = esc(u.initials || initials(u.name || u.username || "U"));

      const el = document.createElement("article");
      el.className = "user-card request-card";
      el.dataset.userid = id;
      el.innerHTML = `
        <div class="user-header"><div class="user-title">Sent you a friend request</div></div>
        <div class="user-main">
          <div class="user-avatar">${inits}</div>
          <div class="user-meta">
            <div class="user-name">${name}</div>
            <div class="user-handle">${handle}</div>
          </div>
          <div class="user-actions">
            <button class="btn btn-ghost req-btn" data-action="accept">Accept</button>
            <button class="btn btn-ghost req-btn" data-action="reject">Reject</button>
          </div>
        </div>`;
      requestsList.appendChild(el);
    }

    async function loadRequests() {
      try {
        const res = await fetch("/api/friend-requests");
        const data = await res.json();
        (data.requests || []).forEach(renderRequest);
      } catch (_) {}
      updateRequestsEmpty();
    }
    loadRequests();

    // ── Suggested users ──────────────────────────────────────
    const suggestedList = getEl("suggested-list");
    const suggestedLoading = getEl("suggested-loading");

    function renderSuggested(u) {
      const name = esc(u.name || u.username || "User");
      const handle = esc(u.handle || "@" + u.username);
      const id = esc(String(u.id));
      const inits = esc(u.initials || initials(u.name || u.username || "U"));
      const btnLabel = u.requested ? "Requested" : "Add Friend";
      const btnDisabled = u.requested ? "disabled" : "";

      const el = document.createElement("article");
      el.className = "user-card suggested-card";
      el.dataset.userid = id;
      const pct = typeof u.similarity === "number" ? Math.round(u.similarity * 100) : null;
      const matchLine = pct != null ? `<div class="user-handle">${pct}% taste match</div>` : "";
      el.innerHTML = `
        <div class="user-header"><div class="user-title">Suggested for you</div></div>
        <div class="user-main">
          <div class="user-avatar">${inits}</div>
          <div class="user-meta">
            <div class="user-name">${name}</div>
            <div class="user-handle">${handle}</div>
            ${matchLine}
          </div>
          <div class="user-actions">
            <button class="btn btn-ghost add-btn" data-action="add-friend" ${btnDisabled}>${btnLabel}</button>
            <a class="btn btn-primary" href="/u/${encodeURIComponent(u.username || u.name)}">View</a>
          </div>
        </div>`;
      suggestedList.appendChild(el);
    }

    async function loadSuggested() {
      const uid = document.body.getAttribute("data-user-id") || "";
      let showedCache = false;
      const cached = window.PulseSimilarityCache && uid ? PulseSimilarityCache.read(uid) : null;
      if (cached && cached.length) {
        if (suggestedLoading && suggestedLoading.parentNode) suggestedLoading.remove();
        cached.forEach(renderSuggested);
        showedCache = true;
      }
      try {
        const res = await fetch("/api/similarity/top-matches", { credentials: "same-origin" });
        const data = await res.json();
        if (suggestedLoading && suggestedLoading.parentNode) suggestedLoading.remove();
        if (window.PulseSimilarityCache && uid && data.users && data.users.length) {
          PulseSimilarityCache.write(uid, data.users);
        }
        suggestedList.querySelectorAll(".suggested-card").forEach(function (n) { n.remove(); });
        if (!data.users || !data.users.length) {
          if (!showedCache) {
            suggestedList.insertAdjacentHTML("beforeend", '<p class="empty-state">No suggestions right now.</p>');
          }
          return;
        }
        data.users.forEach(renderSuggested);
      } catch (_) {
        if (suggestedLoading && suggestedLoading.parentNode) {
          suggestedLoading.textContent = "Could not load suggestions.";
        } else if (!showedCache) {
          suggestedList.insertAdjacentHTML("beforeend", '<p class="empty-state">Could not load suggestions.</p>');
        }
      }
    }
    loadSuggested();

    // ── Search ───────────────────────────────────────────────
    const searchInput = getEl("friendSearch");
    const searchResults = getEl("search-results");
    const searchEmpty = getEl("search-empty");

    function renderSearchResult(u) {
      const name = esc(u.name || u.username || "User");
      const handle = esc(u.handle || "@" + (u.username||""));
      const id = esc(String(u.id));
      const inits = esc(u.initials || initials(u.name || u.username || "U"));
      searchResults.insertAdjacentHTML("beforeend", `
        <article class="user-card search-card" data-userid="${id}">
          <div class="user-header"><div class="user-title">Search result</div></div>
          <div class="user-main">
            <div class="user-avatar">${inits}</div>
            <div class="user-meta">
              <div class="user-name">${name}</div>
              <div class="user-handle">${handle}</div>
            </div>
            <div class="user-actions">
              <button class="btn btn-ghost add-btn" data-action="add-friend">Add Friend</button>
              <a class="btn btn-primary" href="/u/${encodeURIComponent(u.username||u.name)}">View</a>
            </div>
          </div>
        </article>`);
    }

    let timer = null;
    searchInput.addEventListener("input", function () {
      clearTimeout(timer);
      const q = searchInput.value.trim();
      if (!q) { searchResults.innerHTML = ""; searchEmpty.hidden = true; return; }
      timer = setTimeout(async function () {
        try {
          const res = await fetch("/search_users?q=" + encodeURIComponent(q));
          const data = await res.json();
          searchResults.innerHTML = "";
          if (!data.users || !data.users.length) { searchEmpty.hidden = false; return; }
          searchEmpty.hidden = true;
          data.users.forEach(renderSearchResult);
        } catch (_) { searchEmpty.hidden = false; }
      }, 200);
    });

    getEl("clearSearch").addEventListener("click", function () {
      searchInput.value = "";
      searchResults.innerHTML = "";
      searchEmpty.hidden = true;
      searchInput.focus();
    });

    // ── Button actions ───────────────────────────────────────
    document.addEventListener("click", async function (e) {
      const btn = e.target.closest("[data-action]");
      if (!btn) return;
      const action = btn.dataset.action;
      const card = btn.closest(".user-card");

      if (action === "accept") {
        const id = card && card.dataset.userid;
        await fetch("/api/friend-accept", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ requester_id: id })
        });
        card.remove();
        updateRequestsEmpty();
      }

      if (action === "reject") {
        const id = card && card.dataset.userid;
        await fetch("/api/friend-reject", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ requester_id: id })
        });
        card.remove();
        updateRequestsEmpty();
      }

      if (action === "add-friend") {
        const id = card && card.dataset.userid;
        btn.textContent = "Requested";
        btn.disabled = true;
        await fetch("/api/add-friend", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ friend_id: id })
        });
      }
    });
  })();
  </script>
</body>
</html>
