  <dialog id="chatModal" aria-label="Chat dialog">
    <div class="chat-header">
      <div class="chat-title">Chat with <span id="chatWith">Friend</span></div>
      <button class="btn-close" aria-label="Close" id="closeChat">&times;</button>
    </div>

    <div class="chat-body">
      <div class="chat-thread" id="chatThread">
        <div class="msg from-them">
          <div class="avatar them" id="avatarThem">AJ</div>
          <div class="bubble">hey! what are you listening to lately?</div>
        </div>
        <div class="msg from-me">
          <div class="bubble">just been listening to daniel ceasar's newest album wbu?</div>
          <div class="avatar me" id="avatarMe">You</div>
        </div>
      </div>
    </div>

    <div class="chat-footer">
      <input type="text" placeholder="Type a message…">
      <button class="btn btn-primary" >Send</button>
    </div>
  </dialog>

  <script>

    let currentReceiver = null

    function addMessage(text, fromMe=false){
        const thread = document.getElementById("chatThread")

        const msg = document.createElement("div")
        msg.className = fromMe ? "msg from-me" : "msg from-them"

        const bubble = document.createElement("div")
        bubble.className = "bubble"
        bubble.textContent = text

        msg.appendChild(bubble)
        thread.appendChild(msg)

        thread.scrollTop = thread.scrollHeight
    }

    document.querySelectorAll('.user-actions .btn').forEach(btn => {
      btn.addEventListener('click', () => {

        const name = btn.getAttribute('data-name')
        const userid = btn.getAttribute('data-userid')

        chatWith.textContent = name
        currentReceiver = userid

        modal.showModal()

        loadMessages()

      })
    })

    document.getElementById("sendBtn").onclick = async () => {

        const input = document.getElementById("chatInput")
        const text = input.value.trim()

        if(!text || !currentReceiver) return

        addMessage(text, true)

        input.value=""

        await fetch("/api/send_message",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                receiver_id: currentReceiver,
                body: text
            })
        })
    }

    async function loadMessages(){

        if(!currentReceiver) return

        const res = await fetch("/api/get_messages/"+currentReceiver)
        const messages = await res.json()

        const thread = document.getElementById("chatThread")
        thread.innerHTML=""

        messages.forEach(m=>{
            const fromMe = m.sender_id === "{{ session['user_id'] }}"
            addMessage(m.body, fromMe)
        })
    }

    setInterval(loadMessages,3000)

</script>
