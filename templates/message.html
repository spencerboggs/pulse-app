<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pulse - Message</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <style>
    .messaging-layout {
      display: flex;
      height: calc(100vh - 120px);
      gap: 0;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
 
    /* ── LEFT PANEL: conversation list ── */
    .conversation-list {
      width: 300px;
      min-width: 220px;
      background: rgba(11, 29, 58, 0.85);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
    }
 
    .conv-search {
      padding: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
 
    .conv-search input {
      width: 100%;
      padding: 8px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-family: 'Poppins', sans-serif;
      font-size: 0.85rem;
      outline: none;
      box-sizing: border-box;
    }
 
    .conv-items {
      flex: 1;
      overflow-y: auto;
    }
 
    .conv-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
 
    .conv-item:hover,
    .conv-item.active {
      background: rgba(255, 246, 215, 0.06);
    }
 
    .conv-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--bg);
      color: var(--accent-contrast);
      font-weight: 700;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
 
    .conv-info {
      flex: 1;
      min-width: 0;
    }
 
    .conv-name {
      font-weight: 600;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
 
    .conv-preview {
      font-size: 0.78rem;
      color: var(--muted);
      opacity: 0.7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
 
    /* ── RIGHT PANEL: chat window ── */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(11, 29, 58, 0.70);
    }
 
    .chat-panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(11, 29, 58, 0.85);
      display: flex;
      align-items: center;
      gap: 12px;
    }
 
    .chat-panel-header .conv-avatar {
      width: 36px;
      height: 36px;
      font-size: 0.8rem;
    }
 
    .chat-panel-name {
      font-weight: 700;
      font-size: 1rem;
    }
 
    .chat-panel-handle {
      font-size: 0.8rem;
      color: var(--muted);
      opacity: 0.7;
    }
 
    /* empty state */
    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 8px;
    }
 
    .chat-empty-icon {
      font-size: 2.5rem;
    }
 
    /* thread */
    .chat-thread {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
 
    .msg {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 75%;
    }
 
    .msg.from-me {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
 
    .msg.from-them {
      align-self: flex-start;
    }
 
    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.4;
      word-break: break-word;
    }
 
    .from-me .bubble {
      background: var(--bg);
      color: var(--accent-contrast);
      border-bottom-right-radius: 4px;
    }
 
    .from-them .bubble {
      background: rgba(255, 246, 215, 0.12);
      color: var(--fg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-bottom-left-radius: 4px;
    }
 
    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--bg);
      color: var(--accent-contrast);
      font-size: 0.65rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
 
    .from-me .msg-avatar {
      background: rgba(255, 246, 215, 0.2);
      color: var(--fg);
    }
 
    /* footer */
    .chat-footer {
      padding: 12px 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(11, 29, 58, 0.85);
      display: flex;
      gap: 10px;
      align-items: center;
    }
 
    .chat-footer input {
      flex: 1;
      padding: 10px 16px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      outline: none;
    }
 
    .chat-footer input:focus {
      border-color: var(--bg);
    }
 
    .chat-footer .btn {
      flex-shrink: 0;
    }
 
    /* responsive */
    @media (max-width: 600px) {
      .conversation-list {
        width: 72px;
        min-width: 72px;
      }
      .conv-info, .conv-search { display: none; }
      .conv-item { justify-content: center; padding: 12px 0; }
    }
  </style>
</head>
 
<body>
  <main class="container">
    <header class="brand">
      <div class="logo">Pulse</div>
      <p class="subtitle">Messages</p>
    </header>
 
    <div class="messaging-layout">
 
      <!-- LEFT: conversation list -->
      <aside class="conversation-list">
        <div class="conv-search">
          <input type="text" id="userSearch" placeholder="Search users…">
        </div>
        <div class="conv-items" id="convItems">
          <!-- populated by JS -->
        </div>
      </aside>
 
      <!-- RIGHT: chat panel -->
      <section class="chat-panel" id="chatPanel">
        <!-- empty state (shown when no convo selected) -->
        <div class="chat-empty" id="chatEmpty">
          <div class="chat-empty-icon">💬</div>
          <p>Select a conversation to start chatting</p>
        </div>
 
        <!-- chat header (hidden until convo selected) -->
        <div class="chat-panel-header" id="chatHeader" style="display:none;">
          <div class="conv-avatar" id="headerAvatar">--</div>
          <div>
            <div class="chat-panel-name" id="headerName">--</div>
            <div class="chat-panel-handle" id="headerHandle">--</div>
          </div>
        </div>
 
        <!-- message thread (hidden until convo selected) -->
        <div class="chat-thread" id="chatThread" style="display:none;"></div>
 
        <!-- footer (hidden until convo selected) -->
        <div class="chat-footer" id="chatFooter" style="display:none;">
          <input type="text" id="chatInput" placeholder="Type a message…">
          <button class="btn btn-primary" id="sendBtn">Send</button>
        </div>
      </section>
 
    </div>
 
    <p style="margin-top:12px;">
      <a class="btn btn-ghost" href="{{ url_for('home') }}">Back to Home</a>
    </p>
  </main>
 
  <script>
    // ── State ──────────────────────────────────────────────
    const currentUserId = "{{ session['user_id'] }}"
    let currentReceiver = null
    let currentReceiverName = ""
    let pollInterval = null
 
    // ── Helpers ────────────────────────────────────────────
    function initials(name) {
      return name.trim().split(/\s+/).map(w => w[0]).join("").toUpperCase().slice(0, 2)
    }
 
    function getEl(id) { return document.getElementById(id) }
 
    // ── Render a single message bubble ────────────────────
    function renderMessage(body, fromMe, senderInitials) {
      const msg = document.createElement("div")
      msg.className = fromMe ? "msg from-me" : "msg from-them"
 
      const avatar = document.createElement("div")
      avatar.className = "msg-avatar"
      avatar.textContent = fromMe ? initials("You") : senderInitials
 
      const bubble = document.createElement("div")
      bubble.className = "bubble"
      bubble.textContent = body
 
      if (fromMe) {
        msg.appendChild(bubble)
        msg.appendChild(avatar)
      } else {
        msg.appendChild(avatar)
        msg.appendChild(bubble)
      }
 
      return msg
    }
 
    // ── Load messages for current receiver ────────────────
    async function loadMessages() {
      if (!currentReceiver) return
 
      try {
        const res = await fetch("/api/get_messages/" + currentReceiver)
        if (!res.ok) return
        const messages = await res.json()
 
        const thread = getEl("chatThread")
        thread.innerHTML = ""
 
        messages.forEach(m => {
          const fromMe = String(m.sender_id) === String(currentUserId)
          const senderInit = fromMe ? "Me" : initials(currentReceiverName)
          thread.appendChild(renderMessage(m.body, fromMe, senderInit))
        })
 
        thread.scrollTop = thread.scrollHeight
      } catch (err) {
        console.error("Failed to load messages:", err)
      }
    }
 
    // ── Open a conversation ───────────────────────────────
    function openConversation(userId, userName, userHandle) {
      currentReceiver = userId
      currentReceiverName = userName
 
      // update header
      getEl("headerAvatar").textContent = initials(userName)
      getEl("headerName").textContent = userName
      getEl("headerHandle").textContent = userHandle
 
      // show panels
      getEl("chatEmpty").style.display = "none"
      getEl("chatHeader").style.display = "flex"
      getEl("chatThread").style.display = "flex"
      getEl("chatFooter").style.display = "flex"
 
      // highlight active convo
      document.querySelectorAll(".conv-item").forEach(el => el.classList.remove("active"))
      const activeItem = document.querySelector(`.conv-item[data-userid="${userId}"]`)
      if (activeItem) activeItem.classList.add("active")
 
      // load messages & start polling
      loadMessages()
      if (pollInterval) clearInterval(pollInterval)
      pollInterval = setInterval(loadMessages, 3000)
    }
 
    // ── Add a conversation item to the sidebar ────────────
    function addConvItem(user) {
      const item = document.createElement("div")
      item.className = "conv-item"
      item.dataset.userid = user.id
      item.dataset.name = user.name
      item.dataset.handle = user.handle || "@" + user.username
 
      item.innerHTML = `
        <div class="conv-avatar">${initials(user.name || user.username)}</div>
        <div class="conv-info">
          <div class="conv-name">${user.name || user.username}</div>
          <div class="conv-preview">${user.handle || "@" + user.username}</div>
        </div>
      `
 
      item.addEventListener("click", () => {
        openConversation(user.id, user.name || user.username, user.handle || "@" + user.username)
      })
 
      getEl("convItems").appendChild(item)
    }
 
    // ── Search users ──────────────────────────────────────
    let searchTimeout = null
    getEl("userSearch").addEventListener("input", (e) => {
      clearTimeout(searchTimeout)
      const q = e.target.value.trim()
      if (!q) return
 
      searchTimeout = setTimeout(async () => {
        try {
          const res = await fetch("/search_users?q=" + encodeURIComponent(q))
          const data = await res.json()
 
          getEl("convItems").innerHTML = ""
          ;(data.users || []).forEach(addConvItem)
        } catch (err) {
          console.error("Search failed:", err)
        }
      }, 300)
    })
 
    // ── Send message ──────────────────────────────────────
    getEl("sendBtn").addEventListener("click", sendMessage)
    getEl("chatInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage()
    })
 
    async function sendMessage() {
      const input = getEl("chatInput")
      const text = input.value.trim()
      if (!text || !currentReceiver) return
 
      // optimistic render
      const thread = getEl("chatThread")
      thread.appendChild(renderMessage(text, true, "Me"))
      thread.scrollTop = thread.scrollHeight
      input.value = ""
 
      try {
        await fetch("/api/send_message", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            recipient_id: currentReceiver,
            body: text
          })
        })
      } catch (err) {
        console.error("Failed to send message:", err)
      }
    }
  </script>
</body>
 
</html>
