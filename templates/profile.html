<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pulse - Profile</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    .profile-page {
      max-width: 1100px;
      margin: 12vh auto 0;
      padding: 0 24px 40px;
    }

    .profile-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 20px;
      align-items: start;
    }

    /* Sidebar */
    .profile-sidebar {
      position: sticky;
      top: 24px;
      max-height: calc(100vh - 48px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,150,29,0.3) transparent;
    }
    .profile-sidebar::-webkit-scrollbar { width: 4px; }
    .profile-sidebar::-webkit-scrollbar-thumb {
      background: rgba(255,150,29,0.3);
      border-radius: 99px;
    }

    .friends-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .friends-header h2 { margin: 0; font-size: 1.05rem; }
    .friends-count {
      font-size: 0.8rem;
      color: rgba(255,246,215,0.5);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      padding: 2px 10px;
    }

    .friend-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 12px;
      text-decoration: none;
      transition: background 0.15s;
    }
    .friend-row:hover {
      background: rgba(255,255,255,0.05);
      text-decoration: none;
    }
    .friend-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,150,29,0.18);
      border: 1px solid rgba(255,150,29,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      flex-shrink: 0;
      color: var(--fg);
    }
    .friend-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--fg);
    }
    .friend-handle {
      font-size: 0.78rem;
      color: rgba(255,246,215,0.5);
    }

    .friends-empty {
      font-size: 0.88rem;
      color: rgba(255,246,215,0.5);
      text-align: center;
      padding: 18px 8px;
    }

    @media (max-width: 820px) {
      .profile-layout {
        grid-template-columns: 1fr;
      }
      .profile-sidebar {
        position: static;
        max-height: none;
      }
    }
  </style>
</head>

<body>
  <main class="profile-page">
    <header class="brand">
      <div class="logo">Pulse</div>
      <p class="subtitle">meet people through music</p>
    </header>

    <div class="profile-layout">

      <!-- LEFT: main profile content -->
      <section class="card">
        <h2 id="profile-name">{{ display_name }}</h2>

        <!-- Profile picture upload -->
        <form id="profile-upload-form" action="{{ url_for('upload_profile_picture') }}" method="POST" enctype="multipart/form-data">
          <input id="profile-file" type="file" name="profile_picture"
                 accept="image/png,image/jpeg,image/jpg,image/webp,image/gif" hidden />
          <button type="button" id="profile-pic-btn" style="border:0;padding:0;background:transparent;cursor:pointer;">
            <img id="profile-picture" src="{{ img_url }}" alt="Profile Picture"
                 class="profile-pic" title="Click to upload a new profile picture" />
          </button>
        </form>

        <div class="profile-section">
          <h3>music taste</h3>
          <div class="music-info">
            <p><span class="info-label">favorite artist:</span> Tyler, The Creator</p>
            <p><span class="info-label">favorite genre:</span> Neo-Soul</p>
            <p><span class="info-label">most listened to song:</span> See You Again</p>
            <p><span class="info-label">favorite album:</span> IGOR</p>
          </div>
        </div>

        <div class="profile-section" id="followed-section" style="display:none;">
          <h3>Followed Artists &amp; News</h3>
          <ul id="followed-list" style="list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px;"></ul>
        </div>

        <p style="margin-top:16px;">
          <a class="btn btn-ghost" href="{{ url_for('home') }}">Back to Home</a>
        </p>
      </section>

      <!-- RIGHT: sticky friends sidebar -->
      <aside class="profile-sidebar">
        <div class="card">
          <div class="friends-header">
            <h2>Friends</h2>
            <span class="friends-count" id="friends-count">0</span>
          </div>
          <div id="friends-list-inner"></div>
          <p class="friends-empty" id="friends-empty" style="display:none;">
            No friends yet —
            <a href="{{ url_for('matchmaking') }}" style="color:var(--accent);">find some</a>
          </p>
        </div>
      </aside>

    </div><!-- /.profile-layout -->
  </main>

  <script>
    // Profile picture upload
    const fileInput = document.getElementById("profile-file");
    const picBtn    = document.getElementById("profile-pic-btn");
    const form      = document.getElementById("profile-upload-form");
    picBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", () => {
      if (fileInput.files && fileInput.files.length > 0) form.submit();
    });

    // Query param username override (demo)
    (function () {
      const params = new URLSearchParams(window.location.search);
      const user = params.get("user");
      if (user) document.getElementById("profile-name").textContent = user;
    })();

    // Load followed insights
    (async function () {
      try {
        const res  = await fetch("{{ url_for('get_followed_insights') }}");
        const data = await res.json();
        const items = data.items || [];
        if (!items.length) return;

        const list = document.getElementById("followed-list");
        items.forEach(item => {
          const li = document.createElement("li");
          li.style.cssText = "background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 14px;";
          const badges = item.badges
            ? item.badges.split("·").map(b => `<span class="badge" style="font-size:0.75rem;">${b.trim()}</span>`).join(" ")
            : "";
          li.innerHTML = `<div style="font-weight:600;color:var(--fg);font-size:0.95rem;margin-bottom:4px;">${item.title}</div><div style="display:flex;gap:6px;flex-wrap:wrap;">${badges}</div>`;
          list.appendChild(li);
        });
        document.getElementById("followed-section").style.display = "block";
      } catch (e) {}
    })();

    // Load friends list
    (async function () {
      const inner = document.getElementById("friends-list-inner");
      const empty = document.getElementById("friends-empty");
      const count = document.getElementById("friends-count");

      try {
        const res  = await fetch("/friends/list");
        const data = await res.json();
        const friends = data.friends || [];

        count.textContent = friends.length;

        if (!friends.length) {
          empty.style.display = "block";
          return;
        }

        friends.forEach(f => {
          const username = (f.username || "").replace(/</g,"&lt;");
          const initials = (f.username || "?")[0].toUpperCase();
          const profileUrl = "/u/" + encodeURIComponent(f.username || f.id);
          inner.insertAdjacentHTML("beforeend", `
            <a class="friend-row" href="${profileUrl}">
              <div class="friend-avatar">${initials}</div>
              <div>
                <div class="friend-name">${username}</div>
                <div class="friend-handle">@${username}</div>
              </div>
            </a>
          `);
        });
      } catch (e) {
        empty.style.display = "block";
      }
    })();
  </script>
</body>

</html>
