<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pulse - Vibe Rooms</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <style>
    /* ── Room Grid ── */
    .rooms-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
      margin-top: 16px;
    }

    .room-card {
      background: rgba(11, 29, 58, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .room-card:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 150, 29, 0.4);
      box-shadow: 0 10px 28px rgba(0,0,0,0.35);
    }

    .room-emoji {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    .room-name {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--fg);
    }

    .room-count {
      font-size: 0.78rem;
      color: var(--muted);
      opacity: 0.65;
      margin-top: 4px;
    }

    /* ── Chat View ── */
    .chat-view {
      display: none;
      flex-direction: column;
      height: calc(100vh - 180px);
      background: rgba(11, 29, 58, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      overflow: hidden;
      margin-top: 16px;
    }

    .chat-view.active {
      display: flex;
    }

    .chat-view-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(11, 29, 58, 0.95);
    }

    .chat-view-back {
      background: none;
      border: none;
      color: var(--fg);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 0 6px;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .chat-view-back:hover {
      opacity: 1;
    }

    .chat-view-title {
      font-weight: 700;
      font-size: 1rem;
      color: var(--fg);
    }

    .chat-view-subtitle {
      font-size: 0.78rem;
      color: var(--muted);
      opacity: 0.65;
      margin-left: auto;
    }

    .chat-view-thread {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Messages ── */
    .vibe-msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      max-width: 80%;
    }

    .vibe-msg.mine {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .vibe-msg.theirs {
      align-self: flex-start;
    }

    .vibe-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg);
      color: var(--accent-contrast);
      font-size: 0.7rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .vibe-msg.mine .vibe-avatar {
      background: rgba(255, 246, 215, 0.2);
      color: var(--fg);
    }

    .vibe-bubble-wrap {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .vibe-sender {
      font-size: 0.72rem;
      color: var(--muted);
      opacity: 0.65;
      padding: 0 4px;
    }

    .vibe-msg.mine .vibe-sender {
      text-align: right;
    }

    .vibe-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.4;
      word-break: break-word;
    }

    .vibe-msg.theirs .vibe-bubble {
      background: rgba(255, 246, 215, 0.1);
      color: var(--fg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-top-left-radius: 4px;
    }

    .vibe-msg.mine .vibe-bubble {
      background: var(--bg);
      color: var(--accent-contrast);
      border-top-right-radius: 4px;
    }

    /* ── Footer ── */
    .chat-view-footer {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(11, 29, 58, 0.95);
    }

    .chat-view-footer input {
      flex: 1;
      padding: 10px 16px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      outline: none;
      background: rgba(255, 246, 215, 0.05);
      color: var(--fg);
    }

    .chat-view-footer input:focus {
      border-color: var(--bg);
    }

    .chat-view-footer input::placeholder {
      color: rgba(255, 246, 215, 0.35);
    }

    /* ── Empty state ── */
    .room-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      opacity: 0.5;
      gap: 8px;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <main class="container">
    <header class="brand">
      <div class="logo">Pulse</div>
      <p class="subtitle">Vibe Rooms</p>
    </header>

    <section class="card" id="roomsSection">
      <h2>Pick a Room</h2>
      <p style="margin:0 0 4px; font-size:0.88rem; opacity:0.6;">
        Join a genre room and chat with other listeners in real time.
      </p>
      <div class="rooms-grid" id="roomsGrid"></div>
    </section>

    <!-- Chat view (replaces room grid) -->
    <div class="chat-view" id="chatView">
      <div class="chat-view-header">
        <button class="chat-view-back" id="backBtn">←</button>
        <div>
          <div class="chat-view-title" id="chatTitle">Room</div>
        </div>
        <span class="chat-view-subtitle" id="chatSubtitle"></span>
      </div>

      <div class="chat-view-thread" id="chatThread">
        <div class="room-empty" id="roomEmpty">
          <span style="font-size:2rem;">🎵</span>
          <span>No messages yet — start the vibe!</span>
        </div>
      </div>

      <div class="chat-view-footer">
        <input type="text" id="vibeInput" placeholder="Say something…">
        <button class="btn btn-primary" id="vibeSendBtn">Send</button>
      </div>
    </div>

    <p style="margin-top:12px;">
      <a class="btn btn-ghost" href="{{ url_for('home') }}">Back to Home</a>
    </p>
  </main>

  <script>
    // ── Rooms config ──────────────────────────────────────
    const ROOMS = [
      { id: "hip-hop",   name: "Hip-Hop",   emoji: "🎤" },
      { id: "rnb",       name: "R&B",       emoji: "🎶" },
      { id: "pop",       name: "Pop",       emoji: "⭐" },
      { id: "neo-soul",  name: "Neo-Soul",  emoji: "🎸" },
      { id: "afrobeats", name: "Afrobeats", emoji: "🥁" },
      { id: "latin",     name: "Latin",     emoji: "💃" },
      { id: "electronic",name: "Electronic",emoji: "🎧" },
      { id: "indie",     name: "Indie",     emoji: "🌿" },
    ]

    // ── State ─────────────────────────────────────────────
    let currentRoom   = null
    let pollInterval  = null
    let lastCount     = 0

    const username = "{{ session.get('username', 'Guest') }}"

    // ── Build room grid ───────────────────────────────────
    const grid = document.getElementById("roomsGrid")
    ROOMS.forEach(room => {
      const card = document.createElement("div")
      card.className = "room-card"
      card.innerHTML = `
        <div class="room-emoji">${room.emoji}</div>
        <div class="room-name">${room.name}</div>
        <div class="room-count" id="count-${room.id}">0 messages</div>
      `
      card.addEventListener("click", () => openRoom(room))
      grid.appendChild(card)
    })

    // ── Open a room ───────────────────────────────────────
    function openRoom(room) {
      currentRoom = room
      lastCount   = 0

      document.getElementById("roomsSection").style.display = "none"
      document.getElementById("chatView").classList.add("active")
      document.getElementById("chatTitle").textContent = `${room.emoji} ${room.name}`
      document.getElementById("chatSubtitle").textContent = "Live • real-time"
      document.getElementById("chatThread").innerHTML = `
        <div class="room-empty" id="roomEmpty">
          <span style="font-size:2rem;">${room.emoji}</span>
          <span>No messages yet — start the vibe!</span>
        </div>
      `

      loadMessages()
      if (pollInterval) clearInterval(pollInterval)
      pollInterval = setInterval(loadMessages, 2500)

      document.getElementById("vibeInput").focus()
    }

    // ── Back to grid ──────────────────────────────────────
    document.getElementById("backBtn").addEventListener("click", () => {
      if (pollInterval) clearInterval(pollInterval)
      currentRoom = null
      document.getElementById("chatView").classList.remove("active")
      document.getElementById("roomsSection").style.display = "block"
    })

    // ── Load messages ─────────────────────────────────────
    async function loadMessages() {
      if (!currentRoom) return
      try {
        const res  = await fetch(`/api/vibe_rooms/${currentRoom.id}/messages`)
        const data = await res.json()
        const msgs = data.messages || []

        // update count badge on grid card
        const countEl = document.getElementById(`count-${currentRoom.id}`)
        if (countEl) countEl.textContent = `${msgs.length} message${msgs.length !== 1 ? "s" : ""}`

        // only re-render if new messages arrived
        if (msgs.length === lastCount) return
        lastCount = msgs.length

        const thread = document.getElementById("chatThread")
        thread.innerHTML = ""

        if (msgs.length === 0) {
          thread.innerHTML = `
            <div class="room-empty" id="roomEmpty">
              <span style="font-size:2rem;">${currentRoom.emoji}</span>
              <span>No messages yet — start the vibe!</span>
            </div>
          `
          return
        }

        msgs.forEach(m => {
          const mine = m.username === username
          const el   = document.createElement("div")
          el.className = `vibe-msg ${mine ? "mine" : "theirs"}`

          const initials = m.username.trim().split(/\s+/)
            .map(w => w[0]).join("").toUpperCase().slice(0, 2)

          el.innerHTML = `
            <div class="vibe-avatar">${initials}</div>
            <div class="vibe-bubble-wrap">
              <div class="vibe-sender">${mine ? "You" : m.username}</div>
              <div class="vibe-bubble">${escapeHtml(m.body)}</div>
            </div>
          `
          thread.appendChild(el)
        })

        thread.scrollTop = thread.scrollHeight

      } catch (err) {
        console.error("Failed to load vibe messages:", err)
      }
    }

    // ── Send message ──────────────────────────────────────
    document.getElementById("vibeSendBtn").addEventListener("click", sendMessage)
    document.getElementById("vibeInput").addEventListener("keydown", e => {
      if (e.key === "Enter") sendMessage()
    })

    async function sendMessage() {
      const input = document.getElementById("vibeInput")
      const text  = input.value.trim()
      if (!text || !currentRoom) return
      input.value = ""

      try {
        await fetch(`/api/vibe_rooms/${currentRoom.id}/messages`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ body: text })
        })
        loadMessages()
      } catch (err) {
        console.error("Failed to send vibe message:", err)
      }
    }

    // ── Helpers ───────────────────────────────────────────
    function escapeHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    }
  </script>
</body>
</html>
