<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pulse - Weekly Insights</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    .news-list {
      list-style: none;
      padding: 0;
      margin: 20px 0 0;
      display: grid;
      gap: 16px;
    }

    .news-card {
      background: rgba(255,255,255,0.04);
      border-radius: 16px;
      padding: 18px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .news-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .news-title {
      margin: 0 0 8px;
    }

    .news-summary {
      margin: 0 0 14px;
      opacity: 0.9;
    }

    .news-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .badge,
    .pill-date {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.85rem;
      background: rgba(255,255,255,0.08);
    }

    .favorite-form {
      margin: 0;
    }

    .heart-btn {
      border: none;
      background: transparent;
      font-size: 1.8rem;
      cursor: pointer;
      line-height: 1;
      transition: transform 0.15s ease;
    }

    .heart-btn:hover {
      transform: scale(1.1);
    }

    .heart-btn.active {
      color: #ff5c8a;
    }
  </style>
</head>

<body>
  <main class="container">
    <header class="brand">
      <div class="logo">Pulse</div>
      <p class="subtitle">Weekly Insights</p>
    </header>

    <section class="card">
      <h2>Upcoming News</h2>
      <p>Click the heart to follow an insight.</p>

      <ul class="news-list">
        {% for insight in insights %}
        <li class="news-card">
          <div class="news-header">
            <div>
              <h3 class="news-title">{{ insight.title }}</h3>
              <p class="news-summary">{{ insight.summary }}</p>
            </div>

            <form class="favorite-form" method="POST" action="{{ url_for('toggle_favorite_insight', insight_id=insight.id) }}">
              <button
                type="submit"
                class="heart-btn {% if insight.is_favorited %}active{% endif %}"
                title="{% if insight.is_favorited %}Unfollow{% else %}Follow{% endif %}">
                {% if insight.is_favorited %}♥{% else %}♡{% endif %}
              </button>
            </form>
          </div>

          <div class="news-meta">
            {% for badge in insight.badges %}
              <span class="badge">{{ badge }}</span>
            {% endfor %}
            <span class="pill-date">{{ insight.date }}</span>
          </div>
        </li>
        {% endfor %}
      </ul>

      <p style="margin-top:16px;">
        <a class="btn btn-ghost" href="{{ url_for('home') }}">Back to Home</a>
      </p>
    </section>
  </main>
</body>

</html>
